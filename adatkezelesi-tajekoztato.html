<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="index,follow" />
  <title>Adatkezelési tájékoztató | Carvex</title>
  <style>
    :root {
      --ink: #101316;
      --muted: #687078;
      --paper: #f6f5f1;
      --white: #ffffff;
      --line: rgba(16, 19, 22, 0.1);
      --petrol: #0b3f49;
      --petrol-2: #072b32;
      --amber: #c59a48;
      --shadow: 0 28px 70px rgba(20, 25, 30, 0.12);
      --soft-shadow: 0 14px 40px rgba(20, 25, 30, 0.08);
      --glass: rgba(255, 255, 255, 0.72);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #fbfaf7 0%, var(--paper) 34%, #f0efea 100%);
      line-height: 1.65;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      border-bottom: 1px solid rgba(16, 19, 22, 0.08);
      background: rgba(250, 249, 245, 0.72);
      backdrop-filter: saturate(170%) blur(24px);
    }

    .nav {
      width: min(1160px, calc(100% - 40px));
      min-height: 72px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      font-size: 1.03rem;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .brand svg {
      width: 40px;
      height: 40px;
      overflow: visible;
    }

    .top-back {
      color: var(--muted);
      font-weight: 760;
      font-size: 0.94rem;
      padding: 9px 13px;
      border: 1px solid rgba(16, 19, 22, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.55);
    }

    .top-back:hover {
      color: var(--ink);
      border-color: rgba(16, 19, 22, 0.16);
      background: rgba(255, 255, 255, 0.84);
    }

    .legal-shell {
      width: min(920px, calc(100% - 40px));
      margin: 0 auto;
      padding: 36px 0 72px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: var(--petrol);
      font-weight: 760;
    }

    .back-link:hover {
      color: var(--petrol-2);
      text-decoration: underline;
    }

    .legal-card {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 28px;
      padding: clamp(24px, 4vw, 48px);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.05;
      margin-bottom: 12px;
      letter-spacing: 0;
    }

    h2 {
      margin-top: 36px;
      font-size: 1.35rem;
      line-height: 1.25;
      letter-spacing: 0;
    }

    h3 {
      margin-top: 24px;
      font-size: 1.05rem;
    }

    p, li { font-size: 1rem; }
    ul { padding-left: 1.25rem; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 18px 0;
      font-size: 0.95rem;
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.65);
      box-shadow: var(--soft-shadow);
    }

    th, td {
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid var(--line);
      padding: 12px 10px;
    }

    th {
      background: rgba(239, 238, 233, 0.86);
      font-weight: 780;
    }

    .muted { color: var(--muted); }

    .notice {
      background: rgba(239, 238, 233, 0.9);
      border-left: 4px solid var(--petrol);
      padding: 14px 16px;
      border-radius: 12px;
    }

    .placeholder {
      color: #8a4b00;
      font-weight: 700;
    }

    footer {
      padding: 34px 0 88px;
      background: var(--ink);
      color: rgba(255, 255, 255, 0.62);
      font-size: 0.9rem;
    }

    .footer-inner {
      width: min(1160px, calc(100% - 40px));
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-links a {
      color: rgba(255, 255, 255, 0.78);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .footer-links a:hover,
    .footer-links a:focus-visible {
      color: var(--white);
    }

    @media (max-width: 720px) {
      .legal-shell { padding-top: 26px; }
      .nav { min-height: 64px; }
      .brand span { display: none; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="nav">
      <a class="brand" href="./" aria-label="Carvex főoldal">
        <svg viewBox="0 0 64 64" aria-hidden="true">
          <rect width="64" height="64" rx="18" fill="#0b1f24"></rect>
          <path d="M15 37c7-9 27-9 34 0" fill="none" stroke="#d7b56d" stroke-width="3" stroke-linecap="round"></path>
          <path d="M19 41h26" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"></path>
        </svg>
        <span>Carvex</span>
      </a>
      <a class="top-back" href="./">← Vissza a főoldalra</a>
    </div>
  </header>

  <main class="legal-shell">
    <a class="back-link" href="./">← Vissza a főoldalra</a>
  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-row">
        <span>© 2026 Carvex. Minden jog fenntartva.</span>
        <nav class="footer-links" aria-label="Jogi információk">
          <a href="./impresszum.html">Impresszum</a>
          <a href="./adatkezelesi-tajekoztato.html">Adatkezelési tájékoztató</a>
          <a href="./aszf.html">ÁSZF</a>
        </nav>
      </div>
    </div>
  </footer>
</body>
</html>
